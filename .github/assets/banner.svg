<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 440" width="1280" height="440" preserveAspectRatio="xMidYMid slice" role="img" aria-label="KR8TIV V2 — cyber-renaissance design atelier">
  <title>KR8TIV V2 — cyber-renaissance design atelier</title>
  <desc>Animated prism banner with eight chromatic bars, a centred 侍 kanji, and the KR8TIV V2 wordmark. Brand mantras: death to generic, too good to ignore, too real to forget.</desc>

  <defs>
    <!-- Eight chromatic bar gradients tuned to the brand palette. Each
         gradient is dimmer at the very top and bottom so the bars read
         as columns of light, not flat fills. -->
    <linearGradient id="b0" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ff2d4a" stop-opacity="0.18"/>
      <stop offset="50%"  stop-color="#ff2d4a" stop-opacity="0.78"/>
      <stop offset="100%" stop-color="#ff2d4a" stop-opacity="0.10"/>
    </linearGradient>
    <linearGradient id="b1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ff7a1f" stop-opacity="0.18"/>
      <stop offset="50%"  stop-color="#ff7a1f" stop-opacity="0.74"/>
      <stop offset="100%" stop-color="#ff7a1f" stop-opacity="0.10"/>
    </linearGradient>
    <linearGradient id="b2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffd166" stop-opacity="0.20"/>
      <stop offset="50%"  stop-color="#ffd166" stop-opacity="0.78"/>
      <stop offset="100%" stop-color="#ffd166" stop-opacity="0.12"/>
    </linearGradient>
    <linearGradient id="b3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#a3e635" stop-opacity="0.18"/>
      <stop offset="50%"  stop-color="#a3e635" stop-opacity="0.72"/>
      <stop offset="100%" stop-color="#a3e635" stop-opacity="0.10"/>
    </linearGradient>
    <linearGradient id="b4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#3ce6ff" stop-opacity="0.20"/>
      <stop offset="50%"  stop-color="#3ce6ff" stop-opacity="0.78"/>
      <stop offset="100%" stop-color="#3ce6ff" stop-opacity="0.12"/>
    </linearGradient>
    <linearGradient id="b5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#3b82f6" stop-opacity="0.18"/>
      <stop offset="50%"  stop-color="#3b82f6" stop-opacity="0.72"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.10"/>
    </linearGradient>
    <linearGradient id="b6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#8e00ff" stop-opacity="0.20"/>
      <stop offset="50%"  stop-color="#8e00ff" stop-opacity="0.78"/>
      <stop offset="100%" stop-color="#8e00ff" stop-opacity="0.12"/>
    </linearGradient>
    <linearGradient id="b7" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ff6ad5" stop-opacity="0.22"/>
      <stop offset="50%"  stop-color="#ff6ad5" stop-opacity="0.82"/>
      <stop offset="100%" stop-color="#ff6ad5" stop-opacity="0.14"/>
    </linearGradient>

    <!-- Soft kanji glow filter — blur a copy underneath, render the
         original on top, so 侍 reads as a hot-pink ember not a flat
         glyph. Filter region oversized so the blur has room to spread. -->
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Radial vignette — pulls the corners toward black so the centre
         stack reads cleanly without mask-cutting individual bars. -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="62%">
      <stop offset="32%"  stop-color="#050507" stop-opacity="0"/>
      <stop offset="100%" stop-color="#050507" stop-opacity="0.78"/>
    </radialGradient>

    <!-- Top dimmer matching the live splash's `.reveal-sticky::before`
         so the meta type at the corners reads cleanly over the bars. -->
    <linearGradient id="topDim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#050507" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#050507" stop-opacity="0"/>
    </linearGradient>

    <!-- Sweep — a diagonal white wash that travels across the bars
         continuously. Mirrors `.prism-sweep` in the running site. -->
    <linearGradient id="sweep" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- KR8TIV / V2 wordmark gradient — magenta → off-white shimmer. -->
    <linearGradient id="wordGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#ff6ad5"/>
      <stop offset="55%"  stop-color="#f2f1ec"/>
      <stop offset="100%" stop-color="#ff6ad5"/>
      <animate attributeName="x1" values="-1;1" dur="9s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="0;2" dur="9s" repeatCount="indefinite"/>
    </linearGradient>
  </defs>

  <!-- bg -->
  <rect width="1280" height="440" fill="#050507"/>

  <!-- Eight chromatic bars. mix-blend-mode isn't reliable inside SVG
       across viewers; instead each bar uses opacity stops so the centre
       is bright and overlap with neighbours reads as a wash. Per-bar
       drift animations are staggered (negative begin offsets) so the
       motion feels organic, not synchronised. -->
  <g>
    <rect x="0"    y="0" width="160" height="440" fill="url(#b0)">
      <animateTransform attributeName="transform" type="translate" values="0 0; 7 0; -5 0; 0 0" dur="14s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.78;0.95;0.78" dur="6s" repeatCount="indefinite"/>
    </rect>
    <rect x="160"  y="0" width="160" height="440" fill="url(#b1)">
      <animateTransform attributeName="transform" type="translate" values="0 0; -6 0; 8 0; 0 0" dur="14s" begin="-1.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.74;0.92;0.74" dur="6s" begin="-1.0s" repeatCount="indefinite"/>
    </rect>
    <rect x="320"  y="0" width="160" height="440" fill="url(#b2)">
      <animateTransform attributeName="transform" type="translate" values="0 0; 5 0; -7 0; 0 0" dur="14s" begin="-2.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.78;0.96;0.78" dur="6s" begin="-2.0s" repeatCount="indefinite"/>
    </rect>
    <rect x="480"  y="0" width="160" height="440" fill="url(#b3)">
      <animateTransform attributeName="transform" type="translate" values="0 0; -4 0; 6 0; 0 0" dur="14s" begin="-4.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.72;0.90;0.72" dur="6s" begin="-3.0s" repeatCount="indefinite"/>
    </rect>
    <rect x="640"  y="0" width="160" height="440" fill="url(#b4)">
      <animateTransform attributeName="transform" type="translate" values="0 0; 7 0; -5 0; 0 0" dur="14s" begin="-5.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.78;0.96;0.78" dur="6s" begin="-4.0s" repeatCount="indefinite"/>
    </rect>
    <rect x="800"  y="0" width="160" height="440" fill="url(#b5)">
      <animateTransform attributeName="transform" type="translate" values="0 0; -6 0; 5 0; 0 0" dur="14s" begin="-7.0s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.72;0.90;0.72" dur="6s" begin="-5.0s" repeatCount="indefinite"/>
    </rect>
    <rect x="960"  y="0" width="160" height="440" fill="url(#b6)">
      <animateTransform attributeName="transform" type="translate" values="0 0; 5 0; -8 0; 0 0" dur="14s" begin="-8.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.78;0.94;0.78" dur="6s" begin="-1.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="1120" y="0" width="160" height="440" fill="url(#b7)">
      <animateTransform attributeName="transform" type="translate" values="0 0; -7 0; 6 0; 0 0" dur="14s" begin="-9.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.82;1.00;0.82" dur="6s" begin="-2.5s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Sweep wash, travels left → right continuously. -->
  <rect x="-300" y="0" width="600" height="440" fill="url(#sweep)" opacity="0.55">
    <animateTransform attributeName="transform" type="translate" from="0 0" to="1580 0" dur="9s" repeatCount="indefinite"/>
  </rect>

  <!-- Vignette -->
  <rect width="1280" height="440" fill="url(#vignette)"/>

  <!-- Top dimmer for corner type readability -->
  <rect width="1280" height="120" fill="url(#topDim)"/>

  <!-- Vertical white caustic line, centred, breathing opacity -->
  <line x1="640" y1="40" x2="640" y2="400" stroke="#ffffff" stroke-width="0.8">
    <animate attributeName="opacity" values="0.18;0.55;0.18" dur="3.4s" repeatCount="indefinite"/>
    <animate attributeName="x1" values="640;648;636;640" dur="7s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="640;648;636;640" dur="7s" repeatCount="indefinite"/>
  </line>

  <!-- Top-left meta block -->
  <g font-family="ui-monospace, 'JetBrains Mono', 'Cascadia Mono', Menlo, monospace">
    <text x="40" y="40" font-size="11" fill="#ff6ad5" letter-spacing="3.4">(VIII) PRISM 侍</text>
    <text x="40" y="64" font-size="10" fill="#aaaaaa" letter-spacing="2.6">BUILT FOR FOUNDERS WHO'D RATHER START</text>
    <text x="40" y="80" font-size="10" fill="#aaaaaa" letter-spacing="2.6">A CULT THAN A BRAND.</text>
  </g>

  <!-- Top-right status block -->
  <g font-family="ui-monospace, 'JetBrains Mono', 'Cascadia Mono', Menlo, monospace" text-anchor="end">
    <g>
      <circle cx="1208" cy="36" r="3.4" fill="#ff2d4a">
        <animate attributeName="opacity" values="0.45;1;0.45" dur="1.6s" repeatCount="indefinite"/>
      </circle>
      <text x="1240" y="40" font-size="11" fill="#ff6ad5" letter-spacing="3">ON AIR</text>
    </g>
    <text x="1240" y="64" font-size="10" fill="#aaaaaa" letter-spacing="2.6">BY APPOINTMENT, BY INSTINCT</text>
    <text x="1240" y="80" font-size="10" fill="#aaaaaa" letter-spacing="2.6">VIII · PRISM</text>
  </g>

  <!-- Centre stack: 侍 kanji + KR8TIV / V2 + tagline + manifesto line -->
  <g text-anchor="middle">
    <!-- 侍 -->
    <text x="640" y="232" font-family="'Hiragino Mincho ProN', 'Yu Mincho', 'Songti SC', 'Noto Serif JP', serif" font-size="172" fill="#ff6ad5" filter="url(#glow)" font-weight="500">
      <animate attributeName="opacity" values="0.92;1;0.92" dur="4s" repeatCount="indefinite"/>
      侍
    </text>

    <!-- KR8TIV / V2 wordmark — italic serif, gradient shimmer -->
    <text x="640" y="304" font-family="'Instrument Serif', 'Cormorant Garamond', Georgia, serif" font-style="italic" font-size="56" fill="url(#wordGrad)" letter-spacing="-1">
      KR8TIV / V2
    </text>

    <!-- Tagline — small mono, brand grey -->
    <text x="640" y="340" font-family="ui-monospace, 'JetBrains Mono', 'Cascadia Mono', Menlo, monospace" font-size="11" fill="#999999" letter-spacing="5.5">
      CYBER—RENAISSANCE  DESIGN  ATELIER
    </text>

    <!-- Manifesto line — italic serif accent, magenta -->
    <text x="640" y="380" font-family="'Instrument Serif', 'Cormorant Garamond', Georgia, serif" font-style="italic" font-size="17" fill="#ff6ad5" letter-spacing="0.4">
      death to generic. too good to ignore. too real to forget.
    </text>
  </g>

  <!-- Bottom progress strip — scanning magenta tick -->
  <g>
    <rect x="40"  y="416" width="1200" height="1" fill="#ffffff" opacity="0.08"/>
    <rect x="40"  y="416" width="220"  height="1" fill="#ff6ad5">
      <animate attributeName="x" values="40;1020;40" dur="9s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Subtle grain overlay — three rows of low-alpha dots so the
       banner doesn't look like a flat plotter print. Stays still; the
       motion is carried by the bars + sweep + caustic. -->
  <g fill="#ffffff" opacity="0.04">
    <circle cx="120"  cy="92"  r="0.6"/>
    <circle cx="318"  cy="58"  r="0.5"/>
    <circle cx="492"  cy="106" r="0.7"/>
    <circle cx="688"  cy="74"  r="0.5"/>
    <circle cx="864"  cy="98"  r="0.6"/>
    <circle cx="1056" cy="62"  r="0.7"/>
    <circle cx="172"  cy="386" r="0.6"/>
    <circle cx="384"  cy="402" r="0.5"/>
    <circle cx="560"  cy="378" r="0.7"/>
    <circle cx="752"  cy="404" r="0.5"/>
    <circle cx="936"  cy="384" r="0.6"/>
    <circle cx="1148" cy="396" r="0.7"/>
  </g>
</svg>
