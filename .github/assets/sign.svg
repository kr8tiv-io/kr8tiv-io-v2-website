<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" width="720" height="200" preserveAspectRatio="xMidYMid meet" role="img" aria-label="KR8TIV — by appointment, by instinct">
  <defs>
    <filter id="signGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.5"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="signLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#ff6ad5" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#ff6ad5" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#ff6ad5" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="720" height="200" fill="#050507"/>

  <!-- Top + bottom hairlines -->
  <line x1="0" y1="40"  x2="720" y2="40"  stroke="url(#signLine)" stroke-width="1"/>
  <line x1="0" y1="160" x2="720" y2="160" stroke="url(#signLine)" stroke-width="1"/>

  <g text-anchor="middle">
    <!-- Big 侍 kanji with breathing glow -->
    <text x="360" y="118" font-family="'Hiragino Mincho ProN', 'Yu Mincho', 'Noto Serif JP', serif" font-size="76" fill="#ff6ad5" filter="url(#signGlow)">
      <animate attributeName="opacity" values="0.85;1;0.85" dur="3.8s" repeatCount="indefinite"/>
      侍
    </text>

    <!-- Wordmark -->
    <text x="360" y="68" font-family="ui-monospace, 'JetBrains Mono', 'Cascadia Mono', Menlo, monospace" font-size="11" fill="#999999" letter-spacing="6">
      KR8TIV  ·  V2
    </text>

    <!-- Tagline -->
    <text x="360" y="148" font-family="ui-monospace, 'JetBrains Mono', 'Cascadia Mono', Menlo, monospace" font-size="10" fill="#777777" letter-spacing="4.5">
      BY  APPOINTMENT,  BY  INSTINCT
    </text>

    <!-- Mantra -->
    <text x="360" y="184" font-family="'Instrument Serif', 'Cormorant Garamond', Georgia, serif" font-style="italic" font-size="13" fill="#ff6ad5" letter-spacing="0.3">
      death to generic.
    </text>
  </g>

  <!-- Tiny status dot, top-right corner -->
  <g>
    <circle cx="688" cy="22" r="2.4" fill="#ff2d4a">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="1.6s" repeatCount="indefinite"/>
    </circle>
    <text x="680" y="26" text-anchor="end" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="9" fill="#ff6ad5" letter-spacing="2.8">ON AIR</text>
  </g>
</svg>
